<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CertSentinel – Medical Certificate Verifier</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
  <header>
    <nav>
      <h1>🛡️ MedVerify</h1>
      <a href="/history">View History</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>Detect Fake Medical Certificates</h2>
      <p>Upload a medical certificate (image or PDF) for instant AI-powered authenticity analysis.</p>
    </section>

    <section class="upload-card">
      <div id="drop-zone" class="drop-zone" role="button" tabindex="0"
           aria-label="File upload area. Click or drag a file here.">
        <span id="drop-label">📄 Drag &amp; drop or click to upload</span>
        <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.pdf" hidden/>
      </div>
      <p id="file-name" class="file-name"></p>

      <!-- Upload progress bar (hidden until upload starts) -->
      <div id="upload-progress-wrapper" class="confidence-bar-wrapper hidden">
        <label>Uploading…</label>
        <div class="confidence-bar">
          <div id="upload-progress-fill" class="confidence-fill" style="width:0%"></div>
        </div>
        <span id="upload-progress-value">0%</span>
      </div>

      <button id="verify-btn" class="btn-primary" disabled>Verify Certificate</button>
    </section>

    <section id="result-section" class="result-section hidden">
      <div id="result-card" class="result-card">
        <div id="status-badge" class="status-badge"></div>
        <div class="confidence-bar-wrapper">
          <label>Confidence Score</label>
          <div class="confidence-bar">
            <div id="confidence-fill" class="confidence-fill"></div>
          </div>
          <span id="confidence-value"></span>
        </div>
        <h3>Detected Issues</h3>
        <ul id="reasons-list"></ul>
        <h3>Extracted Information</h3>
        <table id="info-table" class="info-table">
          <tbody id="info-tbody"></tbody>
        </table>
      </div>
    </section>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Analysing certificate…</p>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
